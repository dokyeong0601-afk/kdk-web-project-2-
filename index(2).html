<!DOCTYPE html>
<html>
    <head>
        <title>4장 연습문제 풀이</title>
    </head>
    <body>
        <form>
            <table>
                <tr>
                    <td><label for="userid">아이디</label></td>
                    <td><input id="userid" type="text" name="userid"></td>
                </tr>
                <tr>
                    <td><label for="userpassword">비밀번호</label></td>
                    <td><input password="userpassword" type="password" name="userpassword"></td>
                </tr>
                <tr>
                    <td>
                    </td>
                    <td><input type="submit"></td>
                </tr>
            </table>
        </form>
        <hr>

        <form>
            <caption>시작 그룹</caption>
            <table>
                <tr>
                    <td>
                        <input opt="opt1" type="radio" name="first">
                        <label for="opt1">새 탭 페이지 열기</label><br>
                        <input opt="opt2" type="radio" name="second">
                        <label for="opt2">중단한 위치에서 계속하기</label><br>
                        <input opt="opt3" type="radio" name="third">
                        <label for="opt3">특정 페이지 또는 페이지 모음</label><br>
                    </td>
                </tr>
            </table>
        </form>
        <br>
        <form>
            <caption>개인정보 및 보안</caption>
            <table>
                <tr>
                    <td>
                        <input opt="option1" type="checkbox" name="one">
                        <label for="option1">동기화 및 서비스</label><br>
                        <input opt="option2" type="checkbox" name="two">
                        <label for="option2">로그인 허용</label><br>
                        <input opt="option3" type="checkbox" name="three">
                        <label for="option3">페이지 미리 로드</label><br>
                    </td>
                </tr>
            </table>
        </form>
        <hr>
        
        <h1>글 작성하기</h1>
        <form>
            <table>
                <tr>
                    <td><label for="username">작성자</label></td>
                    <td><input name="username" type="text" name="username"></td>
                </tr>
                <tr>
                    <td><label for="id">아이디</label></td>
                    <td><input id="id" type="text" name="id"></td>
                </tr>
                <tr>
                    <td><label for="useremail">이메일</label></td>
                    <td>
                        <input email="useremail" type="text" name="useremail">@
                        <input email="useremail" type="text" name="useremail">
                    </td>
                </tr>
                <tr>
                    <td><label for="phone">휴대폰</label></td>
                    <td>
                        <select>
                            <option>010</option>
                            <option>02</option>
                        </select>-
                        <input number="phone" type="text" name="phone">-
                        <input number="phone" type="text" name="phone">
                    </td>
                </tr>
                <tr>
                    <td><label for="title">글제목</label></td>
                    <td><input texttitle="title" type="text" name="title"></td>
                </tr>
                <tr>
                    <td><label for="content">내용</label></td>
                    <td>
                        <textarea rows="10" cols="30"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                    </td>
                    <td><input type="submit"></td>
                </tr>
            </table>
        </form>
    </body>
</html>
